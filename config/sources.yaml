# News sources configuration
# Topics use dot-notation for hierarchical classification.
# Use --topic at any depth to run a subtree:
#   --topic sport                          -> all sport
#   --topic sport.football                 -> all football
#   --topic sport.football.premier_league  -> just Premier League
#
# Source types:
#   rss  (default) — parse RSS/Atom feed, no selectors needed
#   html           — scrape HTML with CSS selectors
#
# Optional per-source:
#   fetch_full_article: true  — follow article link and scrape full body text

topics:
  - tech.ai
  - sport.football.premier_league
  - sport.football.la_liga
  - sport.football.champions_league

sources:
  # --- tech.ai ---
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    topic: "tech.ai"
    type: rss

  - name: "The Verge AI"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    topic: "tech.ai"
    type: rss

  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/technology-lab"
    topic: "tech.ai"
    type: rss

  # --- sport.football.premier_league ---
  - name: "BBC Premier League"
    url: "https://feeds.bbci.co.uk/sport/football/premier-league/rss.xml"
    topic: "sport.football.premier_league"
    type: rss

  - name: "Guardian Football"
    url: "https://www.theguardian.com/football/premierleague/rss"
    topic: "sport.football.premier_league"
    type: rss

  # --- sport.football.la_liga ---
  - name: "BBC La Liga"
    url: "https://feeds.bbci.co.uk/sport/football/spanish-la-liga/rss.xml"
    topic: "sport.football.la_liga"
    type: rss

  # --- sport.football.champions_league ---
  - name: "BBC Champions League"
    url: "https://feeds.bbci.co.uk/sport/football/champions-league/rss.xml"
    topic: "sport.football.champions_league"
    type: rss
