# News sources configuration
# Topics use dot-notation for hierarchical classification.
# Use --topic at any depth to run a subtree:
#   --topic sport                          -> all sport
#   --topic sport.football                 -> all football
#   --topic sport.football.premier_league  -> just Premier League
#
# Each source needs:
#   - name: Human-readable source name
#   - url: The page to scrape
#   - topic: Dot-notation topic path
#   - selectors: CSS selectors for extracting article data
#     - article: Container element for each article
#     - title: Title element within the article container
#     - link: Link element (href is extracted automatically)
#     - summary: Optional short summary/description element

topics:
  - tech.ai
  - sport.football.premier_league
  - sport.football.la_liga
  - sport.football.champions_league

sources:
  # --- tech.ai ---
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/"
    topic: "tech.ai"
    selectors:
      article: "div.post-block"
      title: "a.post-block__title__link"
      link: "a.post-block__title__link"
      summary: "div.post-block__content"

  - name: "The Verge AI"
    url: "https://www.theverge.com/ai-artificial-intelligence"
    topic: "tech.ai"
    selectors:
      article: "div.duet--content-cards--content-card"
      title: "a h2"
      link: "a"
      summary: "p"

  - name: "Ars Technica AI"
    url: "https://arstechnica.com/ai/"
    topic: "tech.ai"
    selectors:
      article: "li.article"
      title: "h2 a"
      link: "h2 a"
      summary: "p.excerpt"

  # --- sport.football.premier_league ---
  - name: "BBC Premier League"
    url: "https://www.bbc.com/sport/football/premier-league"
    topic: "sport.football.premier_league"
    selectors:
      article: "div[data-testid='alaska-card']"
      title: "h2"
      link: "a"
      summary: "p"

  - name: "Sky Sports Premier League"
    url: "https://www.skysports.com/premier-league-news"
    topic: "sport.football.premier_league"
    selectors:
      article: "div.news-list__item"
      title: "h4.news-list__headline"
      link: "a.news-list__headline-link"
      summary: "p.news-list__snippet"

  - name: "Guardian Premier League"
    url: "https://www.theguardian.com/football/premierleague"
    topic: "sport.football.premier_league"
    selectors:
      article: "div.dcr-1yhtqw5"
      title: "h3"
      link: "a"
      summary: "p"

  # --- sport.football.la_liga ---
  - name: "BBC La Liga"
    url: "https://www.bbc.com/sport/football/spanish-la-liga"
    topic: "sport.football.la_liga"
    selectors:
      article: "div[data-testid='alaska-card']"
      title: "h2"
      link: "a"
      summary: "p"

  # --- sport.football.champions_league ---
  - name: "BBC Champions League"
    url: "https://www.bbc.com/sport/football/champions-league"
    topic: "sport.football.champions_league"
    selectors:
      article: "div[data-testid='alaska-card']"
      title: "h2"
      link: "a"
      summary: "p"
